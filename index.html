<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diario Filosófico">
  <meta name="theme-color" content="#1a1814">
  <title>Diario Filosófico · Manu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --ink: #1a1814; --ink2: #2d2a24; --parchment: #f5f0e8;
      --bg: #faf6ee; --bg2: #f2ece0;
      --gold: #c9a84c; --gold-light: #e8d5a0; --gold-pale: #f5edda;
      --rust: #8b3a2a; --sage: #4a6741; --slate: #3d4a5c;
      --muted: #8a8070; --border: #d4c9b0; --border-light: #e8e0d0;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; background: var(--ink); }
    body { font-family: 'DM Sans', sans-serif; color: var(--ink); display: flex; flex-direction: column; }

    /* HEADER */
    .header { background: var(--ink); padding: calc(var(--safe-top) + 14px) 20px 0; flex-shrink: 0; position: relative; overflow: hidden; }
    .header::before { content:''; position:absolute; top:-40px; right:-40px; width:140px; height:140px; border:1px solid rgba(201,168,76,0.12); border-radius:50%; }
    .header::after { content:''; position:absolute; top:-10px; right:-10px; width:80px; height:80px; border:1px solid rgba(201,168,76,0.08); border-radius:50%; }
    .header-inner { display:flex; align-items:center; gap:14px; }
    .logo { width:42px; height:42px; flex-shrink:0; }
    .header-text { flex:1; }
    .header-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; color:var(--parchment); letter-spacing:0.02em; line-height:1.1; }
    .header-sub { font-size:10px; color:var(--gold); letter-spacing:0.14em; text-transform:uppercase; margin-top:2px; font-weight:300; }

    /* NAV */
    .nav { background:var(--ink); padding:10px 0 0; display:flex; border-bottom:0.5px solid rgba(201,168,76,0.2); flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
    .nav::-webkit-scrollbar { display:none; }
    .nav-tab { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; padding:8px 16px 10px; cursor:pointer; color:rgba(138,128,112,0.7); border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; user-select:none; flex-shrink:0; }
    .nav-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

    /* SCROLL */
    .scroll-content { flex:1; overflow-y:auto; background:var(--bg); -webkit-overflow-scrolling:touch; padding-bottom:calc(var(--safe-bottom) + 24px); }
    .tab-content { display:none; padding:18px 16px 0; }
    .tab-content.active { display:block; }

    /* CONCEPT CARD */
    .concept-card { background:white; border:0.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:12px; }
    .concept-header { display:flex; align-items:center; gap:13px; padding:14px 16px; cursor:pointer; user-select:none; }
    .concept-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .concept-meta { flex:1; min-width:0; }
    .concept-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; color:var(--ink); line-height:1.2; }
    .concept-phase { font-size:10px; color:var(--muted); letter-spacing:0.04em; margin-top:2px; }
    .pdots { display:flex; gap:4px; margin-top:5px; }
    .pdot { width:5px; height:5px; border-radius:50%; background:var(--border-light); }
    .pdot.on { background:var(--gold); }
    .chev { font-size:11px; color:var(--border); transition:transform 0.25s; }
    .chev.open { transform:rotate(180deg); }
    .concept-body { border-top:0.5px solid var(--border-light); padding:14px 16px 16px; display:none; }
    .concept-body.open { display:block; }
    .c-summary { font-family:'Cormorant Garamond',serif; font-size:15px; font-style:italic; line-height:1.65; color:var(--slate); border-left:2px solid var(--gold-light); padding-left:12px; margin-bottom:16px; }

    /* SEC TITLE */
    .sec { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-weight:500; margin:16px 0 8px; }

    /* REF ITEMS */
    .ref-item { background:var(--bg); border:0.5px solid var(--border-light); border-radius:8px; padding:10px 32px 10px 12px; margin-bottom:6px; font-size:13px; line-height:1.65; color:var(--ink); position:relative; }
    .ref-item.chat { background:var(--gold-pale); border-color:var(--gold-light); }
    .ref-label { font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:4px; }
    .ref-date { font-size:10px; color:var(--muted); margin-top:4px; }
    .del { position:absolute; top:8px; right:8px; background:none; border:none; font-size:16px; color:var(--border); cursor:pointer; line-height:1; padding:2px 4px; transition:color 0.15s; }
    .del:active { color:var(--rust); }

    /* MODO */
    .modo-toggle { display:flex; background:var(--bg2); border-radius:8px; overflow:hidden; margin-bottom:10px; border:0.5px solid var(--border-light); }
    .modo-btn { flex:1; text-align:center; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; padding:8px; cursor:pointer; color:var(--muted); transition:all 0.15s; user-select:none; }
    .modo-btn.active { background:var(--ink); color:var(--gold); }

    /* GUIDED */
    .guided-q { background:#fffdf7; border:0.5px solid var(--gold-light); border-radius:8px; padding:12px 14px; margin-bottom:10px; font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--slate); line-height:1.5; }
    .guided-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .gcounter { font-size:10px; color:var(--muted); }

    /* PEND */
    .pend-item { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:0.5px solid var(--border-light); font-size:13px; line-height:1.55; }
    .pend-item:last-child { border-bottom:none; }
    .pcheck { width:18px; height:18px; flex-shrink:0; border:1.5px solid var(--border); border-radius:4px; margin-top:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.15s; }
    .pcheck.done { background:var(--sage); border-color:var(--sage); color:white; }
    .ptext { flex:1; color:var(--ink); }
    .ptext.done { text-decoration:line-through; color:var(--muted); }

    /* INPUTS */
    textarea, input[type="text"], select { font-family:'DM Sans',sans-serif; font-size:14px; background:white; border:0.5px solid var(--border); border-radius:8px; padding:10px 13px; color:var(--ink); width:100%; outline:none; transition:border-color 0.15s; -webkit-appearance:none; }
    textarea { resize:none; min-height:80px; line-height:1.55; }
    textarea:focus, input[type="text"]:focus, select:focus { border-color:var(--gold); }
    .input-row { display:flex; gap:8px; align-items:stretch; }

    /* BUTTONS */
    .btn { font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:0.07em; text-transform:uppercase; font-weight:500; padding:9px 16px; border-radius:8px; border:none; cursor:pointer; transition:all 0.15s; white-space:nowrap; user-select:none; }
    .btn-primary { background:var(--ink); color:var(--gold); }
    .btn-primary:active { background:var(--ink2); }
    .btn-sm { padding:6px 12px; font-size:10px; }
    .btn-ghost { background:transparent; color:var(--muted); border:0.5px solid var(--border); }
    .btn-ghost:active { color:var(--ink); border-color:var(--ink); }

    /* CARD */
    .card { background:white; border:0.5px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:500; color:var(--ink); margin-bottom:14px; }

    /* CONEXIONES */
    .con-item { background:var(--gold-pale); border:0.5px solid var(--gold-light); border-radius:8px; padding:10px 32px 10px 12px; margin-bottom:7px; font-size:13px; line-height:1.65; color:var(--ink); position:relative; }
    .con-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
    .con-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:var(--gold-light); color:#6b5a2a; }
    .tag-pills { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0; }
    .tag-pill { font-size:11px; padding:5px 12px; border-radius:20px; cursor:pointer; border:0.5px solid var(--border); background:white; color:var(--muted); transition:all 0.15s; user-select:none; }
    .tag-pill.active { background:var(--ink); color:var(--gold); border-color:var(--ink); }

    /* GROUP LABEL */
    .group-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-weight:500; margin:16px 0 8px 2px; }
    .group-label:first-child { margin-top:0; }

    /* PLAN */
    .plan-week { background:white; border:0.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:10px; }
    .plan-wh { display:flex; align-items:center; gap:12px; padding:13px 16px; cursor:pointer; user-select:none; }
    .plan-num { width:28px; height:28px; border-radius:50%; background:var(--ink); color:var(--gold); font-size:11px; font-weight:500; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .plan-num.cur { background:var(--gold); color:var(--ink); }
    .plan-wtitle { flex:1; font-size:13px; font-weight:500; color:var(--ink); }
    .plan-wsub { font-size:11px; color:var(--muted); margin-top:1px; }
    .plan-wb { border-top:0.5px solid var(--border-light); display:none; }
    .plan-wb.open { display:block; }
    .plan-day { display:flex; gap:12px; padding:10px 16px; border-bottom:0.5px solid var(--border-light); }
    .plan-day:last-child { border-bottom:none; }
    .plan-dname { font-size:10px; font-weight:500; color:var(--muted); min-width:52px; letter-spacing:0.03em; padding-top:2px; }
    .plan-dact { font-size:13px; color:var(--ink); line-height:1.5; }
    .plan-dtime { font-size:10px; color:var(--muted); margin-top:2px; }
    .ptag { display:inline-block; font-size:9px; padding:1px 6px; border-radius:8px; margin-left:5px; vertical-align:middle; }
    .ptag-c { background:#eeedfe; color:#3c3489; }
    .ptag-l { background:#e1f5ee; color:#085041; }
    .ptag-r { background:#faeeda; color:#633806; }
    .ptag-j { background:#faece7; color:#712b13; }

    /* TEMAS */
    .tema-card { background:white; border:0.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:10px; cursor:pointer; }
    .tema-card:active { opacity:0.85; }
    .tema-inner { display:flex; align-items:center; gap:13px; padding:14px 16px; }
    .tema-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .tema-meta { flex:1; }
    .tema-name { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:500; color:var(--ink); }
    .tema-cat { font-size:10px; color:var(--muted); letter-spacing:0.04em; margin-top:2px; }
    .tema-add { font-size:20px; color:var(--border); transition:color 0.15s; padding:4px; }
    .tema-add.added { color:var(--sage); }
    .lock-box { background:var(--gold-pale); border:0.5px solid var(--gold-light); border-radius:14px; padding:20px; text-align:center; margin-bottom:14px; }
    .lock-icon { font-size:30px; margin-bottom:8px; }
    .lock-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:500; color:var(--ink); margin-bottom:6px; }
    .lock-text { font-size:13px; color:var(--muted); line-height:1.6; }
    .prog-bar-wrap { height:4px; background:var(--border-light); border-radius:2px; margin:12px 0 6px; overflow:hidden; }
    .prog-bar { height:100%; background:var(--gold); border-radius:2px; transition:width 0.4s; }
    .prog-text { font-size:10px; color:var(--muted); }
    .phase-label { font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); font-weight:500; margin:0 0 10px 2px; }

    /* EMPTY / TOAST */
    .empty { font-size:12px; color:var(--muted); font-style:italic; padding:6px 0; }
    .toast { position:fixed; bottom:calc(var(--safe-bottom) + 16px); left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:var(--gold); font-size:12px; padding:9px 18px; border-radius:20px; transition:transform 0.3s; z-index:999; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* SCROLL BAR */
    .scroll-content::-webkit-scrollbar { width:3px; }
    .scroll-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .concept-card { animation:fadeUp 0.3s ease both; }
    .concept-card:nth-child(2){animation-delay:0.05s}
    .concept-card:nth-child(3){animation-delay:0.1s}
  </style>
</head>

<div class="nav">

<script>
const CONCEPTS = [
  { id:'barco', name:'El barco de Teseo', icon:'⚓', bg:'#e8f0f8', phase:'Semana 1 · Identidad personal',
    summary:'¿Sigue siendo el mismo barco si reemplazás todas sus piezas? ¿Y sos vos el mismo si cambia todo en vos?',

  { id:'trauma', name:'Historia como trauma colectivo', icon:'🩸', bg:'#f5ece8', phase:'Semana 3 · Memoria colectiva',

      '¿Qué traumas históricos podrías estar cargando vos sin saberlo?',

      '¿Qué narrativas heredaste sobre quiénes son "los otros"?',
    ]
  }
];

const GUIDED = {
  barco:[
    '¿Qué parte de vos sentís que es más "esencial"? ¿Por qué?',

const INIT_REFS = {
  barco:[
    { texto:'Sí y no. Es el barco aunque las piezas sean distintas, pero aunque sea igual al barco con el que llegó Teseo, no es el mismo, porque han cambiado todas las piezas.', fecha:'16 de marzo de 2025', chat:true, label:'Primera respuesta al dilema del barco' },

  ],
  nietzsche:[], trauma:[]
};

const PLAN = [
  { num:1, cur:true, title:'El barco de Teseo', sub:'Identidad personal', days:[
    { name:'Lun/Mar', act:'Conversamos: historia de Teseo con personajes y giros', time:'10 min', tag:'c', label:'Conversación' },
    { name:'Mié/Jue', act:'Leés "Borges y yo" — pedíme el texto a mí', time:'10 min', tag:'l', label:'Lectura' },
    { name:'Viernes', act:'Escribís: ¿qué hace que vos seas vos? Sin googlear.', time:'10-15 min', tag:'r', label:'Reflexión' },

  ]},
  { num:2, title:'Nietzsche y el nihilismo', sub:'Modernidad y valores', days:[
    { name:'Lun/Mar', act:'Conversamos: Nietzsche como personaje — su vida y su idea central', time:'10 min', tag:'c', label:'Conversación' },
    { name:'Mié/Jue', act:'Leés 3 aforismos de El crepúsculo de los ídolos (te los elijo)', time:'10 min', tag:'l', label:'Lectura' },
    { name:'Viernes', act:'Anotás 2 cosas en tu vida que parezcan "valores vaciados"', time:'10 min', tag:'r', label:'Reflexión' },
    { name:'Fin de sem.', act:'Juego: el detective filosófico — diagnóstico nietzscheano del presente', time:'15-20 min', tag:'j', label:'Juego' },
  ]},
  { num:3, title:'Historia como trauma colectivo', sub:'Memoria colectiva', days:[
    { name:'Lun/Mar', act:'Conversamos: el caso argentino — dictadura, silencio, memoria', time:'10 min', tag:'c', label:'Conversación' },
    { name:'Mié/Jue', act:'Elegís un caso cercano y leés algo breve que te recomiendo', time:'10 min', tag:'l', label:'Lectura' },
    { name:'Viernes', act:'¿Qué traumas históricos podrías estar cargando sin saberlo?', time:'10 min', tag:'r', label:'Reflexión' },
    { name:'Fin de sem.', act:'Juego: el arqueólogo del presente — trauma escondido en noticias actuales', time:'15-20 min', tag:'j', label:'Juego' },
  ]},
  { num:4, title:'Los tres conceptos se tocan', sub:'Conexión', days:[
    { name:'Lun/Mar', act:'¿Puede un pueblo tener identidad como el barco de Teseo? ¿El trauma cambia quién sos?', time:'10 min', tag:'c', label:'Conversación' },
    { name:'Mié/Jue', act:'Leés un fragmento que conecta los tres temas (te lo elijo)', time:'10 min', tag:'l', label:'Lectura' },
    { name:'Viernes', act:'Escribís cómo se conectan los 3 conceptos. Una página máximo.', time:'15 min', tag:'r', label:'Reflexión' },
    { name:'Fin de sem.', act:'El examen socrático — defendés tus ideas, yo te desafío', time:'20 min', tag:'j', label:'Juego' },
  ]},
  { num:5, title:'Consolidación y apertura', sub:'Cierre del ciclo', days:[
    { name:'Lun/Mar', act:'Me explicás los 3 conceptos como si yo no supiera nada', time:'10-15 min', tag:'c', label:'Conversación' },
    { name:'Mié/Jue', act:'Elegimos juntos el próximo tema a explorar', time:'10 min', tag:'c', label:'Conversación' },
    { name:'Fin de sem.', act:'Leés algo nuevo que conecte con lo que ya sabés', time:'15-20 min', tag:'l', label:'Lectura' },
  ]},
];

const NEW_THEMES = [
  { id:'t1', icon:'🧬', bg:'#e8f5e8', name:'El libre albedrío y la neurociencia', cat:'Filosofía de la mente' },
  { id:'t2', icon:'🌀', bg:'#ede8f5', name:'El eterno retorno de Nietzsche', cat:'Filosofía · Continuación' },
  { id:'t3', icon:'👁', bg:'#f0ebe0', name:'El problema difícil de la conciencia', cat:'Filosofía de la mente' },
  { id:'t4', icon:'🏛', bg:'#e8f0f8', name:'Por qué caen los imperios', cat:'Historia' },
  { id:'t5', icon:'🌍', bg:'#f5e8e8', name:'El fin de la globalización', cat:'Actualidad' },
  { id:'t6', icon:'⚖️', bg:'#e8f5ee', name:'Ética del cuidado vs. ética de la justicia', cat:'Filosofía moral' },
  { id:'t7', icon:'🤖', bg:'#e8ecf5', name:'La IA y el sentido del trabajo', cat:'Actualidad · Filosofía' },
  { id:'t8', icon:'📡', bg:'#f5ece8', name:'La paradoja de la información', cat:'Actualidad · Epistemología' },
  { id:'t9', icon:'🔭', bg:'#e8f0f5', name:'El universo como lugar hostil', cat:'Cosmología · Filosofía' },
  { id:'t10', icon:'🎭', bg:'#f0e8f5', name:'Identidad nacional como construcción', cat:'Filosofía política' },
];

// STATE
let S = {
  openConcept: null, openPlanWeek: 1,
  modos: {barco:'libre', nietzsche:'libre', trauma:'libre'},
  gIdx: {barco:0, nietzsche:0, trauma:0},
  selTags: [],
  data: { refs:{barco:[],nietzsche:[],trauma:[]}, pregs:{barco:[],nietzsche:[],trauma:[]}, cons:[], addedThemes:[] }
};

// STORAGE
async function load() {
  try {
    const r = await window.storage.get('dfm-v3');
    if (r && r.value) { S.data = JSON.parse(r.value); }
    else {
      S.data.refs = JSON.parse(JSON.stringify(INIT_REFS));
      S.data.pregs = JSON.parse(JSON.stringify(INIT_PREGS));
      await save();
    }
  } catch(e) {
    S.data.refs = JSON.parse(JSON.stringify(INIT_REFS));
    S.data.pregs = JSON.parse(JSON.stringify(INIT_PREGS));
  }
  renderConceptos(); renderPlan();
}

async function save() {
  try { await window.storage.set('dfm-v3', JSON.stringify(S.data)); } catch(e){}
}

// TOAST
let TT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(TT); TT = setTimeout(() => el.classList.remove('show'), 2200);
}

// TABS
function showTab(t) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  ['conceptos','conexiones','pendientes','plan','temas'].forEach((n,i) => {
    if(n===t) document.querySelectorAll('.nav-tab')[i].classList.add('active');
  });
  if(t==='conexiones') renderConexiones();
  if(t==='pendientes') renderPendientes();
  if(t==='plan') renderPlan();
  if(t==='temas') renderTemas();
}

// UTILS
function h(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── CONCEPTOS ──
function toggleConcept(id) { S.openConcept = S.openConcept===id ? null : id; renderConceptos(); }

function renderConceptos() {
  document.getElementById('concept-grid').innerHTML = CONCEPTS.map((c,ci) => {
    const refs = S.data.refs[c.id]||[];
    const pregs = S.data.pregs[c.id]||[];
    const score = Math.min(refs.length + pregs.length, 3);
    const dots = [0,1,2].map(i=>`<div class="pdot ${i<score?'on':''}"></div>`).join('');
    const isOpen = S.openConcept === c.id;
    const modo = S.modos[c.id];
    const gIdx = S.gIdx[c.id];
    const gqs = GUIDED[c.id];
    const tc = {c:'ptag-c',l:'ptag-l',r:'ptag-r',j:'ptag-j'};

    let body = '';
    if (isOpen) body = `<div class="concept-body open">
      <div class="c-summary">${c.summary}</div>

      <div class="sec">Mis reflexiones</div>
      ${refs.length===0?'<div class="empty">Todavía no escribiste nada aquí.</div>':refs.map((r,i)=>`
        <div class="ref-item ${r.chat?'chat':''}">
          ${r.chat?`<div class="ref-label">${h(r.label||'De nuestra conversación')}</div>`:''}
          ${h(r.texto)}
          <div class="ref-date">${r.fecha}</div>
          <button class="del" onclick="delRef('${c.id}',${i});event.stopPropagation()">×</button>
        </div>`).join('')}

      <div class="sec">Agregar reflexión</div>
      <div class="modo-toggle">
        <div class="modo-btn ${modo==='libre'?'active':''}" onclick="setModo('${c.id}','libre');event.stopPropagation()">Libre</div>
        <div class="modo-btn ${modo==='guiada'?'active':''}" onclick="setModo('${c.id}','guiada');event.stopPropagation()">Guiada</div>
      </div>
      ${modo==='guiada'?`
        <div class="guided-nav">
          <span class="gcounter">${gIdx+1} / ${gqs.length}</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="prevG('${c.id}');event.stopPropagation()">←</button>
            <button class="btn btn-ghost btn-sm" onclick="nextG('${c.id}');event.stopPropagation()">→</button>
          </div>
        </div>
        <div class="guided-q">${gqs[gIdx]}</div>`:''}

      <div onclick="event.stopPropagation()">
        <textarea id="ta-${c.id}" placeholder="${modo==='libre'?'Escribí lo que pensás...':'Tu respuesta...'}" rows="3"></textarea>
        <button class="btn btn-primary" style="margin-top:8px" onclick="addRef('${c.id}');event.stopPropagation()">Guardar</button>
      </div>

      <div class="sec">Preguntas pendientes</div>
      ${pregs.length===0?'<div class="empty">Sin preguntas pendientes.</div>':pregs.map((p,i)=>`
        <div class="pend-item">
          <div class="pcheck ${p.done?'done':''}" onclick="togglePreg('${c.id}',${i});event.stopPropagation()">${p.done?'✓':''}</div>
          <div class="ptext ${p.done?'done':''}">${h(p.texto)}</div>
        </div>`).join('')}

      <div class="sec">Preguntas base</div>
      ${c.preguntasBase.map(p=>`
        <div class="pend-item">
          <div style="width:5px;height:5px;border-radius:50%;background:var(--gold-light);flex-shrink:0;margin-top:6px"></div>
          <div class="ptext" style="color:var(--muted);font-style:italic">${p}</div>
        </div>`).join('')}

      <div onclick="event.stopPropagation()" style="margin-top:10px">
        <div class="input-row">
          <input type="text" id="pi-${c.id}" placeholder="Agregar pregunta pendiente...">
          <button class="btn btn-primary" onclick="addPreg('${c.id}');event.stopPropagation()">+</button>
        </div>
      </div>
    </div>`;

    return `<div class="concept-card" style="animation-delay:${ci*0.05}s">
      <div class="concept-header" onclick="toggleConcept('${c.id}')">
        <div class="concept-icon" style="background:${c.bg}">${c.icon}</div>
        <div class="concept-meta">
          <div class="concept-name">${c.name}</div>
          <div class="concept-phase">${c.phase}</div>
          <div class="pdots">${dots}</div>
        </div>
        <div class="chev ${isOpen?'open':''}">▼</div>
      </div>${body}</div>`;
  }).join('');
}

function setModo(id,m){S.modos[id]=m;renderConceptos();}
function nextG(id){S.gIdx[id]=(S.gIdx[id]+1)%GUIDED[id].length;renderConceptos();}
function prevG(id){const l=GUIDED[id].length;S.gIdx[id]=(S.gIdx[id]-1+l)%l;renderConceptos();}
function addRef(id){
  const el=document.getElementById('ta-'+id);const txt=el.value.trim();if(!txt)return;
  const f=new Date().toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'});
  S.data.refs[id].push({texto:txt,fecha:f});save();el.value='';renderConceptos();toast('Reflexión guardada ✓');
}
function delRef(id,i){S.data.refs[id].splice(i,1);save();renderConceptos();}
function addPreg(id){
  const el=document.getElementById('pi-'+id);const txt=el.value.trim();if(!txt)return;
  S.data.pregs[id].push({texto:txt,done:false});save();el.value='';renderConceptos();toast('Pregunta guardada ✓');
}
function togglePreg(id,i){S.data.pregs[id][i].done=!S.data.pregs[id][i].done;save();renderConceptos();}

// ── CONEXIONES ──
function renderConexiones(){
  const names={barco:'Barco de Teseo',nietzsche:'Nietzsche',trauma:'Trauma colectivo'};
  document.getElementById('con-list').innerHTML = S.data.cons.length===0?'<div class="empty">Todavía no registraste conexiones.</div>':
    S.data.cons.map((c,i)=>`<div class="con-item">
      <button class="del" onclick="delCon(${i})">×</button>
      ${h(c.texto)}
      <div class="con-tags">${(c.tags||[]).map(t=>`<span class="con-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
  document.getElementById('tag-pills').innerHTML = Object.entries(names).map(([k,v])=>
    `<div class="tag-pill ${S.selTags.includes(k)?'active':''}" onclick="toggleTag('${k}')">${v}</div>`).join('');
}
function toggleTag(t){const i=S.selTags.indexOf(t);i===-1?S.selTags.push(t):S.selTags.splice(i,1);renderConexiones();}
function addCon(){
  const el=document.getElementById('con-text');const txt=el.value.trim();if(!txt)return;
  const names={barco:'Barco de Teseo',nietzsche:'Nietzsche',trauma:'Trauma colectivo'};
  S.data.cons.push({texto:txt,tags:S.selTags.map(t=>names[t])});
  save();el.value='';S.selTags=[];renderConexiones();toast('Conexión guardada ✓');
}
function delCon(i){S.data.cons.splice(i,1);save();renderConexiones();}

// ── PENDIENTES ──
function renderPendientes(){
  const names={barco:'Barco de Teseo',nietzsche:'Nietzsche',trauma:'Trauma colectivo'};
  let html='';let total=0;
  CONCEPTS.forEach(c=>{
    const ps=S.data.pregs[c.id]||[];if(!ps.length)return;
    html+=`<div class="group-label">${names[c.id]}</div>`;
    ps.forEach((p,i)=>{total++;html+=`<div class="pend-item">
      <div class="pcheck ${p.done?'done':''}" onclick="togglePregG('${c.id}',${i})">${p.done?'✓':''}</div>
      <div class="ptext ${p.done?'done':''}">${h(p.texto)}</div>
    </div>`;});
  });
  document.getElementById('pend-list').innerHTML=total===0?'<div class="empty">No hay preguntas pendientes todavía.</div>':html;
}
function togglePregG(id,i){S.data.pregs[id][i].done=!S.data.pregs[id][i].done;save();renderPendientes();}
function addPregGlobal(){
  const el=document.getElementById('new-preg');const sel=document.getElementById('new-preg-con');
  const txt=el.value.trim();if(!txt)return;
  S.data.pregs[sel.value].push({texto:txt,done:false});save();el.value='';renderPendientes();toast('Pregunta agregada ✓');
}

// ── PLAN ──
function renderPlan(){
  const tc={c:'ptag-c',l:'ptag-l',r:'ptag-r',j:'ptag-j'};
  document.getElementById('plan-cont').innerHTML = PLAN.map(w=>`
    <div class="plan-week">
      <div class="plan-wh" onclick="togglePlan(${w.num})">
        <div class="plan-num ${w.cur?'cur':''}">${w.num}</div>
        <div style="flex:1">
          <div class="plan-wtitle">${w.title}</div>
          <div class="plan-wsub">${w.sub}</div>
        </div>
        <div style="font-size:11px;color:var(--border)">${S.openPlanWeek===w.num?'▲':'▼'}</div>
      </div>
      <div class="plan-wb ${S.openPlanWeek===w.num?'open':''}">
        ${w.days.map(d=>`<div class="plan-day">
          <div class="plan-dname">${d.name}</div>
          <div style="flex:1">
            <div class="plan-dact">${d.act}<span class="ptag ${tc[d.tag]}">${d.label}</span></div>
            <div class="plan-dtime">${d.time}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}
function togglePlan(n){S.openPlanWeek=S.openPlanWeek===n?null:n;renderPlan();}

// ── TEMAS ──
function renderTemas(){
  const totalRefs = CONCEPTS.reduce((s,c)=>s+(S.data.refs[c.id]||[]).filter(r=>!r.chat).length,0);
  const unlocked = totalRefs >= 3;
  const pct = Math.min(Math.round(totalRefs/3*100),100);
  const added = S.data.addedThemes||[];
  let html='';
  if(!unlocked) html+=`<div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Nuevos temas, muy pronto</div>
    <div class="lock-text">Completá 3 reflexiones propias en los conceptos actuales para desbloquear nuevos temas de estudio.</div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-text">${totalRefs} de 3 reflexiones escritas</div>
  </div>`;
  html+=`<div class="phase-label">${unlocked?'Elegí tu próximo tema':'Vista previa'}</div>`;
  html+=NEW_THEMES.map(t=>`<div class="tema-card" onclick="${unlocked?`addTheme('${t.id}')`:''}" style="${!unlocked?'opacity:0.5;cursor:default;':''}">
    <div class="tema-inner">
      <div class="tema-icon" style="background:${t.bg}">${t.icon}</div>
      <div class="tema-meta">
        <div class="tema-name">${t.name}</div>
        <div class="tema-cat">${t.cat}</div>
      </div>
      <div class="tema-add ${added.includes(t.id)?'added':''}">${added.includes(t.id)?'✓':'+'}</div>
    </div>
  </div>`).join('');
  document.getElementById('temas-cont').innerHTML=html;
}
function addTheme(id){
  if(!S.data.addedThemes)S.data.addedThemes=[];
  if(S.data.addedThemes.includes(id))return;
  S.data.addedThemes.push(id);save();
  const t=NEW_THEMES.find(x=>x.id===id);
  toast(`"${t.name}" agregado ✓`);renderTemas();
}

load();
</script>
