<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Diario Filosófico">
  <meta name="theme-color" content="#1a1814">
  <title>Diario Filosófico · Manu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    :root {
      --ink:#1a1814; --ink2:#2d2a24; --parchment:#f5f0e8;
      --bg:#faf6ee; --bg2:#f2ece0;
      --gold:#c9a84c; --gold-light:#e8d5a0; --gold-pale:#f5edda;
      --rust:#8b3a2a; --sage:#4a6741; --slate:#3d4a5c;
      --muted:#8a8070; --border:#d4c9b0; --border-light:#e8e0d0;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body { height:100%; overflow:hidden; background:var(--ink); }
    body { font-family:'DM Sans',sans-serif; color:var(--ink); display:flex; flex-direction:column; }

    .header { background:var(--ink); padding:calc(var(--safe-top) + 14px) 20px 0; flex-shrink:0; position:relative; overflow:hidden; }
    .header::before { content:''; position:absolute; top:-40px; right:-40px; width:140px; height:140px; border:1px solid rgba(201,168,76,0.12); border-radius:50%; }
    .header::after { content:''; position:absolute; top:-10px; right:-10px; width:80px; height:80px; border:1px solid rgba(201,168,76,0.08); border-radius:50%; }
    .header-inner { display:flex; align-items:center; gap:14px; }
    .logo { width:42px; height:42px; flex-shrink:0; }
    .header-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:500; color:var(--parchment); letter-spacing:0.02em; line-height:1.1; }
    .header-sub { font-size:10px; color:var(--gold); letter-spacing:0.14em; text-transform:uppercase; margin-top:2px; font-weight:300; }
    .header-key { display:flex; align-items:center; gap:6px; cursor:pointer; padding:6px 10px; border-radius:8px; border:0.5px solid rgba(201,168,76,0.3); }
    .key-dot { width:6px; height:6px; border-radius:50%; background:var(--border); flex-shrink:0; }
    .key-dot.on { background:var(--sage); box-shadow:0 0 5px rgba(74,103,65,0.6); }
    .key-label { font-size:9px; color:var(--gold); letter-spacing:0.08em; text-transform:uppercase; font-weight:500; }

    .nav { background:var(--ink); padding:10px 0 0; display:flex; border-bottom:0.5px solid rgba(201,168,76,0.2); flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
    .nav::-webkit-scrollbar { display:none; }
    .nav-tab { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; padding:8px 16px 10px; cursor:pointer; color:rgba(138,128,112,0.7); border-bottom:2px solid transparent; transition:all 0.2s; white-space:nowrap; user-select:none; flex-shrink:0; }
    .nav-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

    .scroll-content { flex:1; overflow-y:auto; background:var(--bg); -webkit-overflow-scrolling:touch; padding-bottom:calc(var(--safe-bottom) + 24px); }
    .tab-content { display:none; padding:18px 16px 0; }
    .tab-content.active { display:block; }

    /* API KEY MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; display:flex; align-items:flex-end; }
    .modal-sheet { background:white; border-radius:20px 20px 0 0; padding:24px 20px calc(var(--safe-bottom) + 24px); width:100%; }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:500; color:var(--ink); margin-bottom:8px; }
    .modal-text { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:16px; }

    /* CONCEPT CARD */
    .concept-card { background:white; border:0.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:12px; }
    .concept-header { display:flex; align-items:center; gap:13px; padding:14px 16px; cursor:pointer; user-select:none; }
    .concept-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .concept-meta { flex:1; min-width:0; }
    .concept-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; color:var(--ink); line-height:1.2; }
    .concept-phase { font-size:10px; color:var(--muted); letter-spacing:0.04em; margin-top:2px; }
    .pdots { display:flex; gap:4px; margin-top:5px; }
    .pdot { width:5px; height:5px; border-radius:50%; background:var(--border-light); }
    .pdot.on { background:var(--gold); }
    .chev { font-size:11px; color:var(--border); transition:transform 0.25s; }
    .chev.open { transform:rotate(180deg); }
    .concept-body { border-top:0.5px solid var(--border-light); display:none; }
    .concept-body.open { display:block; }

    /* CONCEPT BODY SECTIONS */
    .cb-section { padding:16px 16px 0; }
    .cb-section:last-child { padding-bottom:0; }
    .sec-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-weight:500; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .sec-label::after { content:''; flex:1; height:0.5px; background:var(--border-light); }

    /* MATERIAL DEL PLAN */
    .plan-material { background:var(--gold-pale); border:0.5px solid var(--gold-light); border-radius:10px; padding:14px 16px; margin-bottom:8px; }
    .plan-day-tag { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; color:var(--gold); margin-bottom:6px; }
    .plan-activity-title { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:500; color:var(--ink); margin-bottom:4px; line-height:1.3; }
    .plan-activity-sub { font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
    .plan-expand-btn { font-size:11px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; color:var(--gold); background:rgba(201,168,76,0.12); border:0.5px solid rgba(201,168,76,0.3); border-radius:6px; padding:6px 12px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .plan-expand-btn:active { background:rgba(201,168,76,0.2); }
    .plan-text-expanded { margin-top:12px; border-top:0.5px solid var(--gold-light); padding-top:12px; font-family:'Cormorant Garamond',serif; font-size:15px; line-height:1.75; color:var(--slate); white-space:pre-wrap; }

    /* PREGUNTAS BASE */
    .base-questions { display:flex; flex-direction:column; gap:8px; margin-bottom:4px; }
    .base-q { background:#fffdf7; border:0.5px solid var(--gold-light); border-radius:8px; padding:12px 14px; font-family:'Cormorant Garamond',serif; font-size:16px; font-style:italic; color:var(--slate); line-height:1.5; cursor:pointer; transition:all 0.15s; display:flex; align-items:flex-start; gap:10px; }
    .base-q:active { background:var(--gold-pale); border-color:var(--gold); }
    .base-q-num { font-style:normal; font-size:10px; font-family:'DM Sans',sans-serif; letter-spacing:0.06em; color:var(--gold); font-weight:500; margin-top:2px; flex-shrink:0; }
    .base-q-answered { opacity:0.5; border-style:dashed; }

    /* REFLEXIONES */
    .ref-item { background:var(--bg); border:0.5px solid var(--border-light); border-radius:8px; padding:10px 32px 10px 12px; margin-bottom:6px; font-size:13px; line-height:1.65; color:var(--ink); position:relative; }
    .ref-item.from-chat { background:var(--gold-pale); border-color:var(--gold-light); }
    .ref-label { font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); font-weight:500; margin-bottom:4px; }
    .ref-date { font-size:10px; color:var(--muted); margin-top:4px; }
    .del { position:absolute; top:8px; right:8px; background:none; border:none; font-size:16px; color:var(--border); cursor:pointer; line-height:1; padding:2px 4px; }
    .del:active { color:var(--rust); }

    textarea, input[type="text"], select { font-family:'DM Sans',sans-serif; font-size:14px; background:white; border:0.5px solid var(--border); border-radius:8px; padding:10px 13px; color:var(--ink); width:100%; outline:none; transition:border-color 0.15s; -webkit-appearance:none; }
    textarea { resize:none; min-height:76px; line-height:1.55; }
    textarea:focus, input[type="text"]:focus, select:focus { border-color:var(--gold); }
    .input-row { display:flex; gap:8px; align-items:stretch; }

    .btn { font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:0.07em; text-transform:uppercase; font-weight:500; padding:9px 16px; border-radius:8px; border:none; cursor:pointer; transition:all 0.15s; white-space:nowrap; user-select:none; }
    .btn-primary { background:var(--ink); color:var(--gold); }
    .btn-primary:active { background:var(--ink2); }
    .btn-sm { padding:6px 12px; font-size:10px; }
    .btn-ghost { background:transparent; color:var(--muted); border:0.5px solid var(--border); }

    /* CONVERSACIÓN SOCRÁTICA */
    .socratic-section { border-top:1px solid var(--border-light); margin:16px 0 0; background:linear-gradient(to bottom, var(--bg2), var(--bg)); }
    .socratic-header { display:flex; align-items:center; gap:8px; padding:12px 16px; cursor:pointer; user-select:none; border-bottom:0.5px solid transparent; transition:all 0.2s; }
    .socratic-header.open { border-bottom-color:var(--border-light); }
    .soc-icon { font-size:14px; }
    .soc-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; color:var(--muted); flex:1; }
    .soc-label.active { color:var(--gold); }
    .soc-chev { font-size:10px; color:var(--border); transition:transform 0.2s; }
    .soc-chev.open { transform:rotate(180deg); }

    .socratic-body { display:none; padding:12px 16px 16px; }
    .socratic-body.open { display:block; }

    .chat-msgs { min-height:40px; max-height:380px; overflow-y:auto; margin-bottom:12px; -webkit-overflow-scrolling:touch; }
    .msg { margin-bottom:10px; display:flex; flex-direction:column; }
    .msg-user { align-items:flex-end; }
    .msg-ai { align-items:flex-start; }
    .bubble { max-width:88%; padding:10px 13px; border-radius:12px; font-size:13px; line-height:1.6; }
    .bubble-user { background:var(--ink); color:var(--parchment); border-bottom-right-radius:4px; }
    .bubble-ai { background:white; border:0.5px solid var(--border-light); color:var(--ink); border-bottom-left-radius:4px; font-family:'Cormorant Garamond',serif; font-size:15px; }
    .bubble-ai em { font-style:italic; color:var(--muted); }
    .bubble-thinking { background:var(--bg2); border:0.5px dashed var(--border); color:var(--muted); font-style:italic; font-size:12px; }

    /* quick-send pills */
    .quick-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .qpill { font-size:11px; color:var(--slate); background:white; border:0.5px solid var(--border); border-radius:20px; padding:5px 11px; cursor:pointer; transition:all 0.15s; font-family:'Cormorant Garamond',serif; font-style:italic; }
    .qpill:active { background:var(--gold-pale); border-color:var(--gold); color:var(--ink); }

    .chat-input-row { display:flex; gap:8px; }
    .chat-input { flex:1; min-height:42px; max-height:100px; resize:none; font-size:13px; padding:10px 12px; line-height:1.45; }
    .send-btn { width:42px; height:42px; background:var(--ink); color:var(--gold); border:none; border-radius:8px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
    .send-btn:active { background:var(--ink2); }
    .send-btn:disabled { opacity:0.4; }

    .save-from-chat { margin-top:8px; display:flex; gap:6px; align-items:center; }
    .save-chip { font-size:10px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; background:rgba(74,103,65,0.12); color:var(--sage); border:0.5px solid rgba(74,103,65,0.3); border-radius:6px; padding:5px 10px; cursor:pointer; }
    .save-chip:active { background:rgba(74,103,65,0.22); }

    /* PLAN TAB */
    .plan-week { background:white; border:0.5px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:10px; }
    .plan-wh { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; }
    .plan-num { width:28px; height:28px; border-radius:50%; background:var(--bg2); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:500; color:var(--muted); flex-shrink:0; }
    .plan-num.cur { background:var(--gold); border-color:var(--gold); color:var(--ink); }
    .plan-wtitle { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:500; color:var(--ink); }
    .plan-wsub { font-size:11px; color:var(--muted); margin-top:1px; }
    .plan-wb { display:none; border-top:0.5px solid var(--border-light); padding:10px 0; }
    .plan-wb.open { display:block; }
    .plan-day { display:flex; gap:12px; align-items:flex-start; padding:8px 16px; }
    .plan-dname { font-size:10px; color:var(--gold); font-weight:500; letter-spacing:0.06em; text-transform:uppercase; width:34px; flex-shrink:0; padding-top:1px; }
    .plan-dact { font-size:13px; color:var(--ink); line-height:1.45; }
    .plan-dtime { font-size:10px; color:var(--muted); margin-top:2px; }
    .ptag { font-size:9px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; padding:2px 6px; border-radius:4px; margin-left:6px; }
    .ptag-c { background:rgba(61,74,92,0.12); color:var(--slate); }
    .ptag-l { background:rgba(74,103,65,0.12); color:var(--sage); }
    .ptag-r { background:rgba(201,168,76,0.15); color:#9a7a2a; }
    .ptag-j { background:rgba(139,58,42,0.12); color:var(--rust); }

    /* CONEXIONES */
    .con-item { background:white; border:0.5px solid var(--border); border-radius:10px; padding:12px 32px 12px 14px; margin-bottom:8px; font-size:13px; line-height:1.6; color:var(--ink); position:relative; }
    .con-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .con-tag { font-size:10px; background:var(--gold-pale); border:0.5px solid var(--gold-light); border-radius:4px; padding:2px 7px; color:var(--muted); }
    .tag-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
    .tag-pill { font-size:11px; padding:5px 12px; border-radius:20px; border:0.5px solid var(--border); background:white; color:var(--muted); cursor:pointer; }
    .tag-pill.active { background:var(--ink); color:var(--gold); border-color:var(--ink); }

    /* PENDIENTES */
    .group-label { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:500; color:var(--ink); margin:14px 0 6px; padding-bottom:6px; border-bottom:0.5px solid var(--border-light); }
    .group-label:first-child { margin-top:0; }
    .pend-item { display:flex; gap:10px; align-items:flex-start; padding:8px 0; border-bottom:0.5px solid var(--border-light); font-size:13px; line-height:1.55; }
    .pend-item:last-child { border-bottom:none; }
    .pcheck { width:18px; height:18px; flex-shrink:0; border:1.5px solid var(--border); border-radius:4px; margin-top:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.15s; }
    .pcheck.done { background:var(--sage); border-color:var(--sage); color:white; }
    .ptext { flex:1; color:var(--ink); }
    .ptext.done { text-decoration:line-through; color:var(--muted); }

    /* TEMAS */
    .lock-box { background:white; border:0.5px solid var(--border); border-radius:14px; padding:24px 20px; text-align:center; margin-bottom:16px; }
    .lock-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:500; color:var(--ink); margin-bottom:6px; }
    .lock-text { font-size:13px; color:var(--muted); line-height:1.55; margin-bottom:14px; }
    .prog-bar-wrap { background:var(--bg2); border-radius:4px; height:4px; overflow:hidden; margin-bottom:6px; }
    .prog-bar { background:var(--gold); height:100%; border-radius:4px; transition:width 0.4s; }
    .prog-text { font-size:11px; color:var(--muted); }
    .phase-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-weight:500; margin:16px 0 8px; }
    .tema-card { background:white; border:0.5px solid var(--border); border-radius:12px; margin-bottom:8px; cursor:pointer; transition:border-color 0.15s; }
    .tema-card:active { border-color:var(--gold); }
    .tema-inner { display:flex; align-items:center; gap:12px; padding:12px 14px; }
    .tema-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .tema-name { font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:500; color:var(--ink); }
    .tema-cat { font-size:10px; color:var(--muted); margin-top:1px; }
    .tema-add { width:24px; height:24px; border-radius:50%; background:var(--bg2); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted); margin-left:auto; }
    .tema-add.added { background:var(--sage); border-color:var(--sage); color:white; font-size:11px; }

    .empty { font-size:13px; color:var(--muted); text-align:center; padding:24px 0; font-style:italic; font-family:'Cormorant Garamond',serif; }
    .card-section { background:white; border:0.5px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
    .toast { position:fixed; bottom:calc(var(--safe-bottom) + 20px); left:50%; transform:translateX(-50%); background:var(--ink); color:var(--gold); font-size:12px; padding:9px 18px; border-radius:20px; z-index:300; opacity:0; pointer-events:none; transition:opacity 0.2s; white-space:nowrap; }
    .toast.show { opacity:1; }

    /* FASE PROGRESS BAR */
    .phase-bar { display:flex; gap:0; margin:0 16px 0; border-radius:8px; overflow:hidden; border:0.5px solid var(--border-light); }
    .phase-step { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 4px 7px; gap:3px; background:var(--bg2); border-right:0.5px solid var(--border-light); cursor:default; transition:background 0.2s; }
    .phase-step:last-child { border-right:none; }
    .phase-step.done { background:rgba(74,103,65,0.1); }
    .phase-step.active { background:rgba(201,168,76,0.1); }
    .phase-step.sealed { background:rgba(74,103,65,0.15); }
    .phase-icon { font-size:13px; line-height:1; }
    .phase-name { font-size:8px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; color:var(--muted); }
    .phase-step.done .phase-name { color:var(--sage); }
    .phase-step.active .phase-name { color:#9a7a2a; }

    /* SÍNTESIS FINAL */
    .sintesis-section { margin:0 16px 16px; background:linear-gradient(135deg, rgba(74,103,65,0.08), rgba(201,168,76,0.06)); border:0.5px solid rgba(74,103,65,0.25); border-radius:12px; overflow:hidden; }
    .sintesis-header { padding:14px 16px 12px; }
    .sintesis-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; color:var(--ink); margin-bottom:4px; }
    .sintesis-sub { font-size:12px; color:var(--muted); line-height:1.5; }
    .sintesis-saved { font-family:'Cormorant Garamond',serif; font-size:15px; font-style:italic; color:var(--slate); line-height:1.7; padding:0 16px 14px; border-top:0.5px solid rgba(74,103,65,0.2); padding-top:12px; }
    .sintesis-date { font-size:10px; color:var(--muted); margin-top:6px; font-style:normal; font-family:'DM Sans',sans-serif; }

    /* TEMA COMPLETADO */
    .concept-card.sealed { border-color:rgba(74,103,65,0.4); background:rgba(74,103,65,0.03); }
    .sealed-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(74,103,65,0.12); border:0.5px solid rgba(74,103,65,0.3); border-radius:20px; padding:3px 9px; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; color:var(--sage); margin-top:4px; }

    /* CHAT LIMIT WARNING */
    .chat-limit-warn { background:rgba(201,168,76,0.08); border:0.5px solid var(--gold-light); border-radius:8px; padding:10px 13px; margin-bottom:10px; font-size:12px; color:#9a7a2a; line-height:1.5; }
    .chat-limit-warn strong { font-weight:500; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <svg class="logo" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="21" cy="21" r="18" stroke="#c9a84c" stroke-width="1.2" stroke-dasharray="95 18" stroke-linecap="round"/>

  openConcept: null,
  openPlanWeek: 1,
  openMaterial: {}, // {conceptId: materialIndex}
  expandedMaterial: {}, // {conceptId_matIndex: true}

  socOpen: {}, // {conceptId: true}

let apiKey = '';

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('diario-v3', JSON.stringify(S.data));
  localStorage.setItem('diario-chats-v3', JSON.stringify(S.chatHistories));
  localStorage.setItem('diario-qans-v3', JSON.stringify(S.answeredQ));
}
// Helper: compute phase completion for a concept
function getPhases(id) {
  const c = CONCEPTS.find(x=>x.id===id);
  const refs = S.data.refs[id]||[];
  const answered = S.answeredQ[id]||[];
  const hist = S.chatHistories[id]||[];
  const realMsgs = hist.filter(m=>m.content!=='__thinking__').length;
  const p = S.data.phases[id]||{};
  return {
    leer:    !!(p.leer    || (S.expandedMaterial[id+'_0']||S.expandedMaterial[id+'_1']||S.expandedMaterial[id+'_2'])),
    responder: !!(p.responder || answered.length >= 2),
    profundizar: !!(p.profundizar || realMsgs >= 6),
    sintetizar: !!(S.data.sintesis[id])
  };
}
function isSealed(id) {
  const p = getPhases(id);
  return p.leer && p.responder && p.profundizar && p.sintetizar;
}
function load() {
  try { const d = localStorage.getItem('diario-v3'); if(d) S.data = {...S.data, ...JSON.parse(d)}; } catch(e){}
  try { const c = localStorage.getItem('diario-chats-v3'); if(c) S.chatHistories = JSON.parse(c); } catch(e){}
  try { const q = localStorage.getItem('diario-qans-v3'); if(q) S.answeredQ = JSON.parse(q); } catch(e){}
  apiKey = localStorage.getItem('diario-key') || '';
  updateKeyDot();
  renderAll();
}

// ─── NAV ──────────────────────────────────────────────────────────────────────

  document.querySelectorAll('.nav-tab').forEach((el,i) => {
    const tabs = ['conceptos','plan','conexiones','pendientes','temas'];
    el.classList.toggle('active', tabs[i] === t);

// ─── ESCAPE HTML ─────────────────────────────────────────────────────────────

// ─── CONCEPTOS ────────────────────────────────────────────────────────────────
function renderConceptos() {
  document.getElementById('concepts-list').innerHTML = CONCEPTS.map(c => renderConceptCard(c)).join('');
}

function renderConceptCard(c) {
  const isOpen = S.openConcept === c.id;
  const phases = getPhases(c.id);
  const sealed = isSealed(c.id);
  const phaseCount = Object.values(phases).filter(Boolean).length;

  const PHASE_DEFS = [
    {key:'leer',      icon:'📖', name:'Leer'},
    {key:'responder', icon:'✍️',  name:'Responder'},
    {key:'profundizar',icon:'🧠', name:'Profundizar'},
    {key:'sintetizar',icon:'✦',  name:'Sintetizar'},
  ];
  const phaseBar = PHASE_DEFS.map(p => {
    const done = phases[p.key];
    const active = !done && Object.values(phases).filter(Boolean).length === PHASE_DEFS.indexOf(p);
    return `<div class="phase-step ${done?'done':active?'active':''}">
      <span class="phase-icon">${p.icon}</span>
      <span class="phase-name">${done?'✓ ':''} ${p.name}</span>
    </div>`;
  }).join('');

  let body = '';
  if (isOpen) {
    const showSintesis = phases.leer && phases.responder && phases.profundizar;
    body = `<div class="concept-body open">
      <div class="phase-bar">${phaseBar}</div>
      ${renderMaterials(c)}
      ${renderBaseQuestions(c)}
      ${renderReflexiones(c)}
      ${renderSocraticConversation(c)}
      ${showSintesis ? renderSintesis(c) : ''}
    </div>`;
  } else {
    body = `<div class="concept-body"></div>`;
  }

  return `<div class="concept-card ${sealed?'sealed':''}">
    <div class="concept-header" onclick="toggleConcept('${c.id}')">
      <div class="concept-icon" style="background:${c.bg}">${c.icon}</div>
      <div class="concept-meta">
        <div class="concept-name">${c.name}</div>
        <div class="concept-phase">${c.phase}</div>
        ${sealed
          ? `<div class="sealed-badge">✓ Completado</div>`
          : `<div class="pdots">${Array.from({length:4},(_,i)=>`<div class="pdot ${i<phaseCount?'on':''}"></div>`).join('')}</div>`
        }
      </div>
      <div class="chev ${isOpen?'open':''}">▾</div>
    </div>
    ${body}
  </div>`;
}

function toggleConcept(id) {
  S.openConcept = S.openConcept === id ? null : id;
  renderConceptos();
  if (S.openConcept) {
    setTimeout(() => {
      const card = document.querySelector(`.concept-card:has([onclick="toggleConcept('${id}')"])`);
      if (card) card.scrollIntoView({behavior:'smooth', block:'start'});
    }, 100);
  }
}

// ─── MATERIALES DEL PLAN ──────────────────────────────────────────────────────
function renderMaterials(c) {
  const mats = c.planMaterials;
  if (!mats || !mats.length) return '';

  const openIdx = S.openMaterial[c.id] ?? 0;

  const tabs = mats.map((m, i) => {
    const isActive = openIdx === i;
    return `<div onclick="setMaterial('${c.id}',${i})" style="
      padding:6px 10px; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500;
      cursor:pointer; border-bottom:2px solid ${isActive?'var(--gold)':'transparent'};
      color:${isActive?'var(--gold)':'var(--muted)'}; white-space:nowrap; user-select:none;
    ">${m.day}</div>`;
  }).join('');

  const mat = mats[openIdx];
  const expKey = c.id+'_'+openIdx;
  const isExpanded = S.expandedMaterial[expKey];

  let contentHtml = '';
  if (mat.content) {
    contentHtml = isExpanded
      ? `<div class="plan-text-expanded">${h(mat.content)}</div>`
      : `<button class="plan-expand-btn" onclick="toggleMaterialText('${c.id}',${openIdx})">📖 Abrir material</button>`;
  } else {
    contentHtml = `<div style="font-size:12px;color:var(--muted);font-style:italic">Usá el espacio de reflexión de abajo para escribir sobre esto.</div>`;
  }

  if (isExpanded && mat.content) {
    contentHtml = `<button class="plan-expand-btn" onclick="toggleMaterialText('${c.id}',${openIdx})" style="margin-bottom:10px">▲ Cerrar</button>
      <div class="plan-text-expanded">${h(mat.content)}</div>`;
  }

  return `<div class="cb-section">
    <div class="sec-label">Material del plan</div>
    <div style="display:flex;overflow-x:auto;gap:0;border-bottom:0.5px solid var(--border-light);margin-bottom:12px;scrollbar-width:none">${tabs}</div>
    <div class="plan-material">
      <div class="plan-day-tag">${mat.day}</div>
      <div class="plan-activity-title">${mat.title}</div>
      <div class="plan-activity-sub">${mat.subtitle}</div>
      ${contentHtml}
    </div>
  </div>`;
}

function setMaterial(id, idx) {
  S.openMaterial[id] = idx;
  renderConceptos();
}

function toggleMaterialText(id, idx) {
  const key = id+'_'+idx;
  S.expandedMaterial[key] = !S.expandedMaterial[key];
  if (S.expandedMaterial[key]) {
    if (!S.data.phases[id]) S.data.phases[id] = {};
    S.data.phases[id].leer = true;
    save();
  }
  renderConceptos();
}

// ─── PREGUNTAS BASE ───────────────────────────────────────────────────────────
function renderBaseQuestions(c) {
  const answered = S.answeredQ[c.id] || [];
  const qs = c.baseQuestions;

  const qHtml = qs.map((q, i) => {
    const isAnswered = answered.includes(i);
    return `<div class="base-q ${isAnswered?'base-q-answered':''}" onclick="useBaseQuestion('${c.id}',${i})">
      <span class="base-q-num">${isAnswered?'✓':String(i+1).padStart(2,'0')}</span>
      <span>${q}</span>
    </div>`;
  }).join('');

  return `<div class="cb-section" style="padding-bottom:16px">
    <div class="sec-label">Preguntas para pensar</div>
    <div class="base-questions">${qHtml}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px">Tocá una para llevarla a la conversación ↓</div>
  </div>`;
}

function useBaseQuestion(id, qIdx) {
  // Mark as used
  if (!S.answeredQ[id]) S.answeredQ[id] = [];
  if (!S.answeredQ[id].includes(qIdx)) S.answeredQ[id].push(qIdx);
  // Mark responder phase when >= 2 questions engaged
  if (S.answeredQ[id].length >= 2) {
    if (!S.data.phases[id]) S.data.phases[id] = {};
    S.data.phases[id].responder = true;
  }
  // Open socratic section and pre-fill
  S.socOpen[id] = true;
  save();
  renderConceptos();
  // Fill textarea
  setTimeout(() => {
    const ta = document.getElementById('chat-input-'+id);
    if (ta) {
      const concept = CONCEPTS.find(c=>c.id===id);
      ta.value = concept.baseQuestions[qIdx];
      ta.focus();
    }
  }, 100);
}

// ─── REFLEXIONES ─────────────────────────────────────────────────────────────
function renderReflexiones(c) {
  const refs = S.data.refs[c.id] || [];
  const refsHtml = refs.length === 0
    ? `<div class="empty" style="padding:12px 0">Todavía no escribiste reflexiones sobre este tema.</div>`
    : refs.map((r,i) => `<div class="ref-item ${r.fromChat?'from-chat':''}">
        <button class="del" onclick="delRef('${c.id}',${i})">×</button>
        ${r.fromChat?'<div class="ref-label">De la conversación</div>':''}
        ${h(r.texto)}
        <div class="ref-date">${r.fecha}</div>
      </div>`).join('');

  return `<div class="cb-section" style="padding-bottom:16px">
    <div class="sec-label">Mis reflexiones</div>
    ${refsHtml}
    <textarea id="ref-input-${c.id}" placeholder="Escribí lo que pensás sobre esto..." style="margin-top:8px" rows="3"></textarea>
    <div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="addRef('${c.id}')">Guardar reflexión</button>
      <button class="btn btn-ghost btn-sm" onclick="addPregDesdeConcept('${c.id}')">+ Pregunta pendiente</button>
    </div>
  </div>`;
}

function addRef(id) {
  const el = document.getElementById('ref-input-'+id);
  const txt = el.value.trim();
  if (!txt) return;
  const now = new Date();
  const fecha = now.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  S.data.refs[id].push({texto:txt, fecha, fromChat:false});
  save(); el.value='';
  renderConceptos();
  toast('Reflexión guardada ✓');
}

function delRef(id, i) {
  S.data.refs[id].splice(i,1);
  save(); renderConceptos();
}

function addPregDesdeConcept(id) {
  const el = document.getElementById('ref-input-'+id);
  const txt = el.value.trim();
  if (!txt) { toast('Escribí la pregunta arriba primero'); return; }
  S.data.pregs[id].push({texto:txt, done:false});
  save(); el.value='';
  renderPendientes();
  toast('Pregunta guardada en Pendientes ✓');
}

// ─── CONVERSACIÓN SOCRÁTICA ───────────────────────────────────────────────────
function renderSocraticConversation(c) {
  const isOpen = !!S.socOpen[c.id];
  const hasKey = !!apiKey;
  const hist = S.chatHistories[c.id] || [];

  const msgs = hist.map(m => {
    if (m.role === 'user') {
      return `<div class="msg msg-user"><div class="bubble bubble-user">${h(m.content)}</div></div>`;
    } else {
      const txt = m.content === '__thinking__'
        ? `<div class="bubble bubble-thinking">Claude está pensando...</div>`
        : `<div class="bubble bubble-ai">${renderMarkdown(m.content)}</div>`;
      return `<div class="msg msg-ai">${txt}</div>`;
    }
  }).join('');

  // Quick send suggestions based on last AI message
  const lastAI = [...hist].reverse().find(m=>m.role==='assistant' && m.content!=='__thinking__');
  const quickPills = hist.length === 0 ? `
    <div class="quick-pills">
      <div class="qpill" onclick="quickSend('${c.id}','Empecemos. ¿Por dónde arrancamos?')">Empecemos →</div>
      <div class="qpill" onclick="quickSend('${c.id}','Tengo una duda sobre el tema')">Tengo una duda</div>
    </div>` : '';

  const noKeyMsg = !hasKey
    ? `<div style="background:var(--gold-pale);border:0.5px solid var(--gold-light);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--muted);margin-bottom:10px">Necesitás agregar tu API key de Claude para usar esta sección. <span style="color:var(--gold);cursor:pointer;font-weight:500" onclick="openKeyModal()">Agregar clave →</span></div>`
    : '';

  // Count real exchanges (pairs of user+ai)
  const realMsgs = hist.filter(m=>m.content!=='__thinking__').length;
  const exchanges = Math.floor(realMsgs / 2);
  const MAX_EXCHANGES = 8;
  const limitReached = exchanges >= MAX_EXCHANGES;
  const phases = getPhases(c.id);

  let limitBanner = '';
  if (limitReached && !phases.profundizar) {
    limitBanner = `<div class="chat-limit-warn">
      <strong>Llegaste a un buen punto de cierre.</strong> Tuviste 8 intercambios sobre este tema. Guardá las ideas que te resonaron y pasá a sintetizar tu posición abajo.
    </div>`;
  } else if (exchanges >= 5 && !limitReached) {
    limitBanner = `<div class="chat-limit-warn" style="background:rgba(201,168,76,0.04)">
      Llevas ${exchanges} intercambios · quedan ${MAX_EXCHANGES - exchanges} antes del cierre
    </div>`;
  }

  const inputDisabled = !hasKey || limitReached;

  return `<div class="socratic-section">
    <div class="socratic-header ${isOpen?'open':''}" onclick="toggleSocratic('${c.id}')">
      <span class="soc-icon">🧠</span>
      <span class="soc-label ${hasKey?'active':''}">Profundizar · Conversación socrática${exchanges > 0 ? ' · '+exchanges+'/'+MAX_EXCHANGES : ''}</span>
      <span class="soc-chev ${isOpen?'open':''}">▾</span>
    </div>
    <div class="socratic-body ${isOpen?'open':''}">
      ${noKeyMsg}
      ${limitBanner}
      <div class="chat-msgs" id="msgs-${c.id}">${msgs}</div>
      ${quickPills}
      ${!inputDisabled ? `<div class="chat-input-row">
        <textarea class="chat-input" id="chat-input-${c.id}" placeholder="Escribí tu reflexión o pregunta..." rows="2"></textarea>
        <button class="send-btn" id="send-btn-${c.id}" onclick="sendMsg('${c.id}')">↑</button>
      </div>` : limitReached ? `<div style="text-align:center;padding:8px 0"><span style="font-size:12px;color:var(--muted);cursor:pointer" onclick="clearChat('${c.id}')">Reiniciar conversación</span></div>` : ''}
      ${hist.length > 0 ? `<div class="save-from-chat">
        <span class="save-chip" onclick="saveLastAIMsg('${c.id}')">💾 Guardar como reflexión</span>
        <span style="font-size:11px;color:var(--muted)">Guardá las ideas que te resuenen</span>
      </div>` : ''}
    </div>
  </div>`;
}

function toggleSocratic(id) {
  S.socOpen[id] = !S.socOpen[id];
  renderConceptos();
  if (S.socOpen[id]) {
    setTimeout(() => {
      const msgs = document.getElementById('msgs-'+id);
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 100);
  }
}

function quickSend(id, text) {
  const ta = document.getElementById('chat-input-'+id);
  if (ta) { ta.value = text; sendMsg(id); }
}

function clearChat(id) {
  S.chatHistories[id] = [];
  save(); renderConceptos();
}

function saveLastAIMsg(id) {
  const hist = S.chatHistories[id] || [];
  const lastAI = [...hist].reverse().find(m=>m.role==='assistant' && m.content!=='__thinking__');
  if (!lastAI) return;
  const now = new Date();
  S.data.refs[id].push({
    texto: lastAI.content,
    fecha: now.toLocaleDateString('es-AR',{day:'numeric',month:'short'}),
    fromChat: true
  });
  save(); renderConceptos();
  toast('Guardado en tus reflexiones ✓');
}

function renderMarkdown(txt) {
  return txt
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

async function sendMsg(id) {
  const ta = document.getElementById('chat-input-'+id);
  const btn = document.getElementById('send-btn-'+id);
  const text = ta.value.trim();
  if (!text || !apiKey) return;

  if (!S.chatHistories[id]) S.chatHistories[id] = [];

  ta.value = '';
  S.chatHistories[id].push({role:'user', content:text});
  S.chatHistories[id].push({role:'assistant', content:'__thinking__'});
  if(btn) btn.disabled=true;
  renderConceptos();

  setTimeout(() => {
    const msgs = document.getElementById('msgs-'+id);
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
  }, 50);

  const concept = CONCEPTS.find(c=>c.id===id);

  // Build context with refs
  const userRefs = (S.data.refs[id]||[]).filter(r=>!r.fromChat);
  let systemPrompt = concept.socraticSystem;
  if (userRefs.length) {
    systemPrompt += `\n\nReflexiones previas de Manu sobre este tema:\n${userRefs.map(r=>'- '+r.texto).join('\n')}`;
  }

  const messages = S.chatHistories[id]
    .filter(m=>m.content!=='__thinking__')
    .map(m=>({role:m.role, content:m.content}));

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        system:systemPrompt,
        messages
      })
    });
    const data = await res.json();
    S.chatHistories[id] = S.chatHistories[id].filter(m=>m.content!=='__thinking__');
    if (data.error) {
      S.chatHistories[id].push({role:'assistant', content:`*Error:* ${data.error.message}`});
    } else {
      S.chatHistories[id].push({role:'assistant', content:data.content[0].text});
    }
  } catch(e) {
    S.chatHistories[id] = S.chatHistories[id].filter(m=>m.content!=='__thinking__');
    S.chatHistories[id].push({role:'assistant', content:'*Hubo un error de conexión. Verificá tu API key.*'});
  }

  save();
  if(btn) btn.disabled=false;
  renderConceptos();
  setTimeout(() => {
    const msgs = document.getElementById('msgs-'+id);
    if(msgs) msgs.scrollTop=msgs.scrollHeight;
  }, 50);
}

// ─── SÍNTESIS FINAL ───────────────────────────────────────────────────────────
function renderSintesis(c) {
  const saved = S.data.sintesis[c.id];
  if (saved) {
    return `<div class="sintesis-section">
      <div class="sintesis-header">
        <div class="sintesis-title">Tu posición sobre este tema</div>
        <div class="sintesis-sub">Esto queda como tu síntesis del ciclo. Podés editarla cuando quieras.</div>
      </div>
      <div class="sintesis-saved">
        ${h(saved.texto)}
        <div class="sintesis-date">${saved.fecha} · <span style="cursor:pointer;color:var(--gold)" onclick="editSintesis('${c.id}')">Editar</span></div>
      </div>
    </div>`;
  }

  return `<div class="sintesis-section">
    <div class="sintesis-header">
      <div class="sintesis-title">✦ Momento de sintetizar</div>
      <div class="sintesis-sub">Llegaste a la última fase. Escribí tu posición sobre este tema en 2–3 oraciones. No tiene que ser perfecta, tiene que ser tuya.</div>
    </div>
    <div style="padding:0 16px 16px">
      <textarea id="sint-input-${c.id}" placeholder="Después de todo esto, lo que creo es..." rows="4" style="margin-bottom:10px"></textarea>
      <button class="btn btn-primary" style="width:100%" onclick="saveSintesis('${c.id}')">Guardar y cerrar el tema</button>
    </div>
  </div>`;
}

function saveSintesis(id) {
  const el = document.getElementById('sint-input-'+id);
  const txt = el ? el.value.trim() : '';
  if (!txt) { toast('Escribí algo primero'); return; }
  const now = new Date();
  S.data.sintesis[id] = {
    texto: txt,
    fecha: now.toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})
  };
  if (!S.data.phases[id]) S.data.phases[id] = {};
  S.data.phases[id].sintetizar = true;
  save();
  renderConceptos();
  toast('Tema completado ✓');
}

function editSintesis(id) {
  S.data.sintesis[id] = null;
  save(); renderConceptos();
}

// ─── CONEXIONES ───────────────────────────────────────────────────────────────
function renderConexiones() {
  const names = {barco:'Barco de Teseo',nietzsche:'Nietzsche',trauma:'Trauma colectivo'};
  document.getElementById('con-list').innerHTML = S.data.cons.length===0
    ? '<div class="empty">Todavía no registraste conexiones.</div>'
    : S.data.cons.map((c,i)=>`<div class="con-item">
        <button class="del" onclick="delCon(${i})">×</button>
        ${h(c.texto)}
        <div class="con-tags">${(c.tags||[]).map(t=>`<span class="con-tag">${t}</span>`).join('')}</div>
      </div>`).join('');
  document.getElementById('tag-pills').innerHTML = Object.entries(names).map(([k,v])=>
    `<div class="tag-pill ${S.selTags.includes(k)?'active':''}" onclick="toggleTag('${k}')">${v}</div>`).join('');
}
function toggleTag(t){const i=S.selTags.indexOf(t);i===-1?S.selTags.push(t):S.selTags.splice(i,1);renderConexiones();}
function addCon(){
  const el=document.getElementById('con-text');const txt=el.value.trim();if(!txt)return;
  const names={barco:'Barco de Teseo',nietzsche:'Nietzsche',trauma:'Trauma colectivo'};
  S.data.cons.push({texto:txt,tags:S.selTags.map(t=>names[t])});
  save();el.value='';S.selTags=[];renderConexiones();toast('Conexión guardada ✓');
}
function delCon(i){S.data.cons.splice(i,1);save();renderConexiones();}

// ─── PENDIENTES ───────────────────────────────────────────────────────────────
function renderPendientes(){
  const names={barco:'Barco de Teseo',nietzsche:'Nietzsche',trauma:'Trauma colectivo'};
  let html='';let total=0;
  CONCEPTS.forEach(c=>{
    const ps=S.data.pregs[c.id]||[];if(!ps.length)return;
    html+=`<div class="group-label">${names[c.id]}</div>`;
    ps.forEach((p,i)=>{total++;html+=`<div class="pend-item">
      <div class="pcheck ${p.done?'done':''}" onclick="togglePregG('${c.id}',${i})">${p.done?'✓':''}</div>
      <div class="ptext ${p.done?'done':''}">${h(p.texto)}</div>
    </div>`;});
  });
  document.getElementById('pend-list').innerHTML=total===0?'<div class="empty">No hay preguntas pendientes todavía.</div>':html;
}
function togglePregG(id,i){S.data.pregs[id][i].done=!S.data.pregs[id][i].done;save();renderPendientes();}
function addPregGlobal(){
  const el=document.getElementById('new-preg');const sel=document.getElementById('new-preg-con');
  const txt=el.value.trim();if(!txt)return;
  S.data.pregs[sel.value].push({texto:txt,done:false});save();el.value='';renderPendientes();toast('Pregunta agregada ✓');
}

// ─── PLAN ─────────────────────────────────────────────────────────────────────
function renderPlan(){
  const tc={c:'ptag-c',l:'ptag-l',r:'ptag-r',j:'ptag-j'};
  document.getElementById('plan-cont').innerHTML=PLAN.map(w=>`
    <div class="plan-week">
      <div class="plan-wh" onclick="togglePlan(${w.num})">
        <div class="plan-num ${w.cur?'cur':''}">${w.num}</div>
        <div style="flex:1"><div class="plan-wtitle">${w.title}</div><div class="plan-wsub">${w.sub}</div></div>
        <div style="font-size:11px;color:var(--border)">${S.openPlanWeek===w.num?'▲':'▼'}</div>
      </div>
      <div class="plan-wb ${S.openPlanWeek===w.num?'open':''}">
        ${w.days.map(d=>`<div class="plan-day">
          <div class="plan-dname">${d.name}</div>
          <div style="flex:1"><div class="plan-dact">${d.act}<span class="ptag ${tc[d.tag]}">${d.label}</span></div><div class="plan-dtime">${d.time}</div></div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}
function togglePlan(n){S.openPlanWeek=S.openPlanWeek===n?null:n;renderPlan();}

// ─── TEMAS ────────────────────────────────────────────────────────────────────
function renderTemas(){
  const totalRefs=CONCEPTS.reduce((s,c)=>s+(S.data.refs[c.id]||[]).filter(r=>!r.fromChat).length,0);
  const unlocked=totalRefs>=3;
  const pct=Math.min(Math.round(totalRefs/3*100),100);
  const added=S.data.addedThemes||[];
  let html='';
  if(!unlocked) html+=`<div class="lock-box">
    <div style="font-size:30px;margin-bottom:8px">🔒</div>
    <div class="lock-title">Nuevos temas, muy pronto</div>
    <div class="lock-text">Completá 3 reflexiones propias para desbloquear nuevos temas.</div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-text">${totalRefs} de 3 reflexiones escritas</div>
  </div>`;
  html+=`<div class="phase-label">${unlocked?'Elegí tu próximo tema':'Vista previa'}</div>`;
  html+=NEW_THEMES.map(t=>`<div class="tema-card" onclick="${unlocked?`addTheme('${t.id}')`:''}" style="${!unlocked?'opacity:0.5;cursor:default;':''}">
    <div class="tema-inner">
      <div class="tema-icon" style="background:${t.bg}">${t.icon}</div>
      <div class="tema-meta"><div class="tema-name">${t.name}</div><div class="tema-cat">${t.cat}</div></div>
      <div class="tema-add ${added.includes(t.id)?'added':''}">${added.includes(t.id)?'✓':'+'}</div>
    </div></div>`).join('');
  document.getElementById('temas-cont').innerHTML=html;
}
function addTheme(id){
  if(!S.data.addedThemes)S.data.addedThemes=[];
  if(S.data.addedThemes.includes(id))return;
  S.data.addedThemes.push(id);save();
  toast(`"${NEW_THEMES.find(x=>x.id===id).name}" agregado ✓`);renderTemas();
}

load();
</script>
</body>
</html>
